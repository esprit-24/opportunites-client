<div class="container mt-4">
  <h3 class="mb-4 text-center">Toutes les opportunités</h3>

  <ng-container *ngIf="opportunites.length > 0; else noOffers">
    <div class="row g-4">
      <div *ngFor="let offre of opportunites" class="col-md-6 col-lg-4">
        <!-- Ajout de la classe "card-hover" -->
        <div class="card h-100 shadow-sm border-0 card-hover">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title text-primary fw-bold">{{ offre.titre }}</h5>

            <p class="small text-muted mb-1">
              <i class="fas fa-building me-2 text-secondary"></i>
              {{ offre.organisation?.nom || 'Organisation inconnue' }}
            </p>

            <p class="small mb-1">
              <i class="fas fa-map-marker-alt me-2 text-danger"></i>
              {{ offre.ville?.nom || 'Ville non précisée' }}
            </p>

            <p class="small text-muted mb-2">
              <i class="fas fa-briefcase me-2 text-success"></i>
              {{ offre.typeContrat || 'Type de contrat non spécifié' }}
            </p>

            <p class="text-muted small mb-3">
              {{ offre.description | slice:0:120 }}...
            </p>

            <div class="mt-auto d-flex justify-content-between">
              <button class="btn btn-outline-primary btn-sm" (click)="voirPlus(offre)">
                <i class="fas fa-eye me-1"></i>
                {{ offre.showFullDescription ? 'Voir moins' : 'Voir plus' }}
              </button>

              <button class="btn btn-success btn-sm" (click)="postuler(offre)">
                <i class="fas fa-paper-plane me-1"></i> Postuler
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #noOffers>
    <div class="alert alert-secondary text-center">
      Aucune opportunité disponible pour le moment.
    </div>
  </ng-template>
</div>
