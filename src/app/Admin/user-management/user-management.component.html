<!-- Header -->
<div class="admin-header mt-4 me-3 mb-4">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col">
                <h1 class="admin-title">
                    <i class="fas fa-users me-3"></i>Gestion des Utilisateurs
                </h1>
                <p class="admin-subtitle">Gérer les candidats, recruteurs et administrateurs</p>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary-custom">
                    <i class="fas fa-plus me-2"></i>Ajouter un recruteur
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Users Table -->
<div class="card admin-card">
    <div class="card-header mb-4">
        <h5 class="card-title mb-0">
            <i class="fas fa-list me-2"></i>Liste des Utilisateurs
        </h5>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Login</th>
                    <th>Prénom</th>
                    <th>Rôle</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users">
                <td>
                    <div class="d-flex align-items-center">
                        <h6 class="mb-0">{{ user.login }}</h6>
                    </div>
                </td>
                <td>
                    <div class="d-flex align-items-center">
                        <h6 class="mb-0">{{ user.firstName }}</h6>
                    </div>
                </td>
                <td>
                    <span [class]="getUserRoleBadgeClass(user.authorities)">
                    {{ getUserRoleLabel(user.authorities) }}
                    </span>
                </td>
                <td>
                    <span *ngIf="user.activated" class="badge bg-success">Actif</span>
                    <span *ngIf="!user.activated" class="badge bg-danger">Inactif</span>
                </td>
                <td>
                    <div class="btn-group" role="group">
                    <button class="btn btn-sm btn-outline-primary"
                            (click)="detailsUser(user)"
                            title="Voir les détails">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="btn btn-sm"
                            [ngClass]="user.activated ? 'btn-outline-warning' : 'btn-outline-success'"
                            (click)="toggleActivation(user)"
                            [title]="user.activated ? 'Désactiver' : 'Activer'">
                        <i [ngClass]="user.activated ? 'fas fa-times' : 'fas fa-check'"></i>
                    </button>

                    <button class="btn btn-sm btn-outline-danger"
                            (click)="deleteUser(user)"
                            title="Supprimer"
                            [disabled]="hasRole(user, 'ROLE_ADMIN')">
                        <i class="fas fa-trash"></i>
                    </button>
                    </div>
                </td>
                </tr>
            </tbody>
            </table>
        </div>
    </div>
</div>
