<table>
    <thead>
        <tr>
        <th>Nom d’utilisateur</th>
        <th>Email</th>
        <th>Activé</th>
        <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let user of users">
        <td>{{ user.login }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.activated ? 'Oui' : 'Non' }}</td>
        <td>
            <button *ngIf="!user.activated" (click)="activateUser(user)">Activer</button>
        </td>
        </tr>
    </tbody>
</table>
